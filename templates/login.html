<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RetailPOS – Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 30% 40%, #1a1a6e 0%, #0d0d2b 55%, #0a1628 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #e2e8f0;
    }

    .wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 100%;
      max-width: 520px;
      padding: 24px;
    }

    /* ── Brand ── */
    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .logo {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #7c5cfc, #5b8af5);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo svg { width: 40px; height: 40px; color: #fff; }

    .brand-name {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: #fff;
    }

    .brand-sub {
      font-size: 0.85rem;
      color: #94a3b8;
      letter-spacing: 0.2px;
    }

    /* ── Card ── */
    .card {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      padding: 36px 40px 32px;
      backdrop-filter: blur(10px);
    }

    .card-title {
      font-size: 1.15rem;
      font-weight: 600;
      color: #f1f5f9;
      margin-bottom: 24px;
    }

    /* ── Form ── */
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }

    label {
      font-size: 0.85rem;
      font-weight: 500;
      color: #94a3b8;
      letter-spacing: 0.3px;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      font-size: 0.95rem;
      color: #e2e8f0;
      outline: none;
      transition: border-color 0.2s;
    }

    input::placeholder { color: #4a5568; }
    input:focus { border-color: #6d5af5; }

    .btn-signin {
      width: 100%;
      margin-top: 20px;
      padding: 13px;
      background: linear-gradient(135deg, #6d5af5, #5b8af5);
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: opacity 0.2s;
    }

    .btn-signin:hover { opacity: 0.88; }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 20px 0 14px;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.08);
    }

    .divider span {
      font-size: 0.78rem;
      color: #4a5568;
      white-space: nowrap;
    }

    /* ── Demo buttons ── */
    .demo-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .btn-demo {
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 9px;
      font-size: 0.82rem;
      color: #94a3b8;
      cursor: pointer;
      transition: background 0.2s;
      text-align: center;
    }

    .btn-demo:hover { background: rgba(255, 255, 255, 0.11); color: #e2e8f0; }
  </style>
</head>
<body>

<div class="wrapper">

  <!-- Brand -->
  <div class="brand">
    <div class="logo">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13l-1.4 7h12.8M7 13l-1-5h13" />
        <circle cx="9" cy="21" r="1" fill="currentColor" stroke="none"/>
        <circle cx="20" cy="21" r="1" fill="currentColor" stroke="none"/>
      </svg>
    </div>
    <span class="brand-name">RetailPOS</span>
    <span class="brand-sub">Point of Sale &amp; Management System</span>
  </div>

  <!-- Card -->
  <div class="card">
    <p class="card-title">Sign in to your account</p>

    <form method="post" action="#">
      {% csrf_token %}

      <div class="field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="you@pos.com" autocomplete="email" />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <button type="submit" class="btn-signin">Sign In</button>
    </form>

    {% if error %}
    <div style="margin-top:12px;padding:9px 12px;background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.25);border-radius:8px;font-size:0.78rem;color:#f87171;">
      {{ error }}
    </div>
    {% endif %}

    <div class="divider"><span>Quick demo login</span></div>

    <div class="demo-grid">
      <button class="btn-demo" type="button" onclick="demo('superAdmin@example.com')">👑 Super Admin</button>
      <button class="btn-demo" type="button" onclick="demo('admin@example.com')">🖥️ Admin</button>
      <button class="btn-demo" type="button" onclick="demo('cashier@example.com')">🛒 Cashier</button>
    </div>
  </div>

</div>

<script>
  function demo(email) {
    document.getElementById('email').value = email;
    document.getElementById('password').value = 'demo1234';
    document.querySelector('form').submit();
  }
</script>

</body>
</html>
