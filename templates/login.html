<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RetailPOS – Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f4f8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #1e293b;
    }

    .wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      width: 100%;
      max-width: 420px;
      padding: 24px;
    }

    /* Brand */
    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .logo {
      width: 60px;
      height: 60px;
      background: #4f7ef8;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo svg { width: 32px; height: 32px; color: #fff; }

    .brand-name {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1e293b;
      letter-spacing: -0.3px;
    }

    .brand-sub {
      font-size: 0.82rem;
      color: #94a3b8;
    }

    /* Card */
    .card {
      width: 100%;
      background: #ffffff;
      border-radius: 16px;
      padding: 36px 32px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
    }

    .card-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #1e293b;
      margin-bottom: 24px;
    }

    /* Form */
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }

    label {
      font-size: 0.82rem;
      font-weight: 500;
      color: #64748b;
    }

    input {
      width: 100%;
      padding: 11px 14px;
      background: #f8fafc;
      border: 1.5px solid #e2e8f0;
      border-radius: 9px;
      font-size: 0.95rem;
      color: #1e293b;
      outline: none;
      transition: border-color 0.15s;
    }

    input::placeholder { color: #cbd5e1; }
    input:focus { border-color: #4f7ef8; background: #fff; }

    .btn-signin {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      background: #4f7ef8;
      border: none;
      border-radius: 9px;
      font-size: 0.97rem;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-signin:hover { background: #3b6ff0; }

    /* Error */
    .error-msg {
      margin-top: 14px;
      padding: 10px 13px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      font-size: 0.82rem;
      color: #ef4444;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 22px 0 16px;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e2e8f0;
    }

    .divider span {
      font-size: 0.78rem;
      color: #94a3b8;
      white-space: nowrap;
    }

    /* Demo buttons */
    .demo-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .btn-demo {
      padding: 9px 12px;
      background: #f8fafc;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.8rem;
      color: #475569;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      text-align: center;
    }

    .btn-demo:hover { border-color: #4f7ef8; color: #4f7ef8; background: #eff4ff; }
  </style>
</head>
<body>

<div class="wrapper">

  <!-- Brand -->
  <div class="brand">
    <div class="logo">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13l-1.4 7h12.8M7 13l-1-5h13" />
        <circle cx="9" cy="21" r="1" fill="currentColor" stroke="none"/>
        <circle cx="20" cy="21" r="1" fill="currentColor" stroke="none"/>
      </svg>
    </div>
    <span class="brand-name">RetailPOS</span>
    <span class="brand-sub">Point of Sale &amp; Management System</span>
  </div>

  <!-- Card -->
  <div class="card">
    <p class="card-title">Sign in to your account</p>

    <form method="post" action="#">
      {% csrf_token %}

      <div class="field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="you@example.com" autocomplete="email" />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <button type="submit" class="btn-signin">Sign In</button>
    </form>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <div class="divider"><span>Quick demo login</span></div>

    <div class="demo-grid">
      <button class="btn-demo" type="button" onclick="demo('superAdmin@example.com')">👑 Super Admin</button>
      <button class="btn-demo" type="button" onclick="demo('admin@example.com')">🖥️ Admin</button>
      <button class="btn-demo" type="button" onclick="demo('cashier@example.com')">🛒 Cashier</button>
    </div>
  </div>

</div>

<script>
  function demo(email) {
    document.getElementById('email').value = email;
    document.getElementById('password').value = 'demo1234';
    document.querySelector('form').submit();
  }
</script>

</body>
</html>
