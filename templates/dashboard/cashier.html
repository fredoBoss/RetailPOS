<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cashier – RetailPOS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      display: flex; min-height: 100vh;
      background: #0d0d2b;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #e2e8f0;
    }
    .sidebar {
      width: 220px; flex-shrink: 0;
      background: rgba(255,255,255,0.04);
      border-right: 1px solid rgba(255,255,255,0.07);
      display: flex; flex-direction: column; padding: 24px 0;
    }
    .sidebar-logo {
      display: flex; align-items: center; gap: 10px;
      padding: 0 20px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .sidebar-logo .icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #7c5cfc, #5b8af5);
      border-radius: 10px; display: flex; align-items: center; justify-content: center;
    }
    .sidebar-logo .icon svg { width: 20px; height: 20px; color: #fff; }
    .sidebar-logo span { font-size: 0.95rem; font-weight: 700; color: #fff; }
    .nav { flex: 1; padding: 16px 0; }
    .nav-label { font-size: 0.62rem; font-weight: 600; letter-spacing: 0.8px; color: #4a5568; text-transform: uppercase; padding: 0 20px 8px; }
    .nav a {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 20px; font-size: 0.82rem; color: #94a3b8;
      text-decoration: none; transition: background 0.15s, color 0.15s;
    }
    .nav a:hover, .nav a.active { background: rgba(109,90,245,0.15); color: #a78bfa; }
    .nav a svg { width: 16px; height: 16px; flex-shrink: 0; }
    .sidebar-footer { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.07); }
    .sidebar-footer a { display: flex; align-items: center; gap: 8px; font-size: 0.78rem; color: #ef4444; text-decoration: none; }
    .sidebar-footer a svg { width: 15px; height: 15px; }
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 28px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.02);
    }
    .topbar h1 { font-size: 1rem; font-weight: 600; color: #f1f5f9; }
    .user-chip {
      display: flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 20px; padding: 5px 12px 5px 6px;
    }
    .avatar {
      width: 26px; height: 26px; border-radius: 50%;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem; font-weight: 700; color: #fff;
    }
    .user-chip span { font-size: 0.75rem; color: #cbd5e1; }
    .role-badge { font-size: 0.6rem; font-weight: 600; letter-spacing: 0.4px; background: rgba(234,179,8,0.15); color: #eab308; border-radius: 4px; padding: 2px 6px; text-transform: uppercase; }
    .content { flex: 1; padding: 28px; overflow-y: auto; }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 24px; }
    .stat-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; padding: 18px; }
    .stat-label { font-size: 0.7rem; color: #64748b; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-value { font-size: 1.6rem; font-weight: 700; color: #f1f5f9; }
    .stat-sub { font-size: 0.7rem; color: #22c55e; margin-top: 4px; }

    .section-title { font-size: 0.82rem; font-weight: 600; color: #94a3b8; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
    .panel { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; padding: 18px; margin-bottom: 14px; }

    .new-sale-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #6d5af5, #5b8af5);
      border: none; border-radius: 10px;
      font-size: 0.95rem; font-weight: 600; color: #fff;
      cursor: pointer; transition: opacity 0.2s; margin-bottom: 14px;
    }
    .new-sale-btn:hover { opacity: 0.88; }
    .new-sale-btn svg { width: 18px; height: 18px; }

    table { width: 100%; border-collapse: collapse; }
    th { font-size: 0.65rem; color: #4a5568; text-transform: uppercase; letter-spacing: 0.5px; padding: 0 0 10px; text-align: left; }
    td { font-size: 0.78rem; color: #cbd5e1; padding: 8px 0; border-top: 1px solid rgba(255,255,255,0.05); }
    td:last-child { text-align: right; }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13l-1.4 7h12.8M7 13l-1-5h13"/>
        <circle cx="9" cy="21" r="1" fill="currentColor" stroke="none"/>
        <circle cx="20" cy="21" r="1" fill="currentColor" stroke="none"/>
      </svg>
    </div>
    <span>RetailPOS</span>
  </div>
  <nav class="nav">
    <div class="nav-label">POS</div>
    <a href="#" class="active">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Dashboard
    </a>
    <a href="#">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
      New Sale
    </a>
    <a href="#">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      My Transactions
    </a>
  </nav>
  <div class="sidebar-footer">
    <a href="{% url 'logout' %}">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h6a2 2 0 012 2v1"/></svg>
      Logout
    </a>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <h1>Cashier Dashboard</h1>
    <div class="user-chip">
      <div class="avatar">C</div>
      <span>{{ user.email }}</span>
      <span class="role-badge">Cashier</span>
    </div>
  </div>

  <div class="content">
    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">Today's Revenue</div>
        <div class="stat-value">₱0</div>
        <div class="stat-sub">My sales today</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Transactions</div>
        <div class="stat-value">0</div>
        <div class="stat-sub">Today</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Items Sold</div>
        <div class="stat-value">0</div>
        <div class="stat-sub">Today</div>
      </div>
    </div>

    <button class="new-sale-btn">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
      Start New Sale
    </button>

    <div class="panel">
      <div class="section-title">Recent Transactions</div>
      <table>
        <thead><tr><th>Receipt #</th><th>Items</th><th>Total</th></tr></thead>
        <tbody>
          <tr><td colspan="3" style="color:#4a5568;font-size:0.75rem;text-align:center;padding:16px 0">No transactions yet today</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

</body>
</html>
